<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Task Monster</title>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/icons/favicon-32.png"
		/>
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#4075a6" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Task Monster" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<script>
			(() => {
				const themes = new Set([
					'light',
					'dark',
					'neo-candy-tokyo-night',
					'vampire-candy',
					'magica-pink',
					'candy-apple-green',
					'deep-earth',
					'cherry-sprout-in-earth',
					'candy-cloud',
					'deep-royal-purple-gold',
					'forbidden-apple',
					'black-widow',
					'kawaii',
					'spooky',
					'ancient-book',
					'tea-and-leaves',
					'metal',
					'hard-rock',
					'ancient-cavern-torch',
					'dark-lain',
					'ultraglow',
					'matrix-neo',
					'lain',
					'ultra-white'
				]);
				const themeMetaColors = {
					light: '#4075a6',
					dark: '#111b2a',
					'neo-candy-tokyo-night': '#08091f',
					'vampire-candy': '#14030b',
					'magica-pink': '#d9369b',
					'candy-apple-green': '#7ce13a',
					'deep-earth': '#17110c',
					'cherry-sprout-in-earth': '#0b0706',
					'candy-cloud': '#d8f4ff',
					'deep-royal-purple-gold': '#14051f',
					'forbidden-apple': '#090506',
					'black-widow': '#050507',
					kawaii: '#ffe7f3',
					spooky: '#120819',
					'ancient-book': '#ead8b8',
					'tea-and-leaves': '#f1ecd7',
					metal: '#101318',
					'hard-rock': '#090706',
					'ancient-cavern-torch': '#06080a',
					'dark-lain': '#050805',
					ultraglow: '#070416',
					'matrix-neo': '#020703',
					lain: '#edf0ec',
					'ultra-white': '#ffffff'
				};
				const darkThemes = new Set([
					'dark',
					'neo-candy-tokyo-night',
					'vampire-candy',
					'deep-earth',
					'cherry-sprout-in-earth',
					'deep-royal-purple-gold',
					'forbidden-apple',
					'black-widow',
					'spooky',
					'metal',
					'hard-rock',
					'ancient-cavern-torch',
					'dark-lain',
					'ultraglow',
					'matrix-neo'
				]);

				try {
					const readCookieValue = (name) => {
						const cookie = document.cookie
							.split(';')
							.map((part) => part.trim())
							.find((part) => part.startsWith(`${name}=`));

						return cookie ? decodeURIComponent(cookie.slice(name.length + 1)) : null;
					};
					const activeToken =
						readCookieValue('task_monster_session_token') ||
						localStorage.getItem('task_monster_session_token') ||
						'';
					let accounts = [];

					try {
						const parsedAccounts = JSON.parse(
							localStorage.getItem('task_monster_session_accounts') || '[]'
						);
						accounts = Array.isArray(parsedAccounts) ? parsedAccounts : [];
					} catch {
						accounts = [];
					}

					const activeAccount = accounts.find((account) => account?.token === activeToken);
					const storedTheme =
						activeAccount?.user?.theme || localStorage.getItem('task_monster_theme');
					const theme = themes.has(storedTheme) ? storedTheme : 'light';
					const themeColor = themeMetaColors[theme] || themeMetaColors.light;

					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = darkThemes.has(theme) ? 'dark' : 'light';
					document.querySelector('meta[name="theme-color"]')?.setAttribute('content', themeColor);
				} catch {
					document.documentElement.dataset.theme = 'light';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
